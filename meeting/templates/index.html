<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teman Meeting Kamu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3B82F6;
            --primary-light: #60A5FA;
            --primary-dark: #2563EB;
            --bg: #ffffff;
            --surface: #F8FAFC;
            --surface-hover: #F1F5F9;
            --border: #E2E8F0;
            --text: #1E293B;
            --text-muted: #64748B;
            --success: #10B981;
            --danger: #EF4444;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Header */
        header {
            text-align: center;
            padding: 30px 0 20px;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .brand-icon { font-size: 2rem; }
        .brand-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
        }
        .brand-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Join Form */
        .join-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 200px);
            padding: 20px;
        }
        .join-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .join-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* Meeting Container */
        .meeting-container { display: none; }
        .meeting-container.active { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }

        /* Room Header */
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .room-label { color: var(--text-muted); font-size: 0.875rem; }
        .room-id {
            font-weight: 600;
            color: var(--primary);
            font-family: monospace;
        }
        .btn-copy {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-copy:hover { background: var(--surface-hover); }
        .btn-exit {
            background: #fff;
            border: 2px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
        }
        .btn-exit:hover {
            background: var(--danger);
            color: #fff;
        }

        /* Video Section */
        .video-section { display: flex; flex-direction: column; gap: 16px; }

        /* Video Grid - Zoom/GMeet Style */
        .video-grid {
            display: grid;
            gap: 16px;
            padding: 16px 0;
        }
        .video-grid.single { grid-template-columns: 1fr; max-width: 900px; margin: 0 auto; width: 100%; }
        .video-grid.two { grid-template-columns: repeat(2, 1fr); }
        .video-grid.three { grid-template-columns: repeat(3, 1fr); }
        .video-grid.four { grid-template-columns: repeat(2, 1fr); }
        .video-grid.five { grid-template-columns: repeat(3, 1fr); }
        .video-grid.six { grid-template-columns: repeat(3, 1fr); }
        .video-grid.many { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

        .video-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            aspect-ratio: 4/3;
            box-shadow: var(--shadow-sm);
        }
        .video-card video,
        .video-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
        .video-card .username {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(255,255,255,0.95);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: var(--shadow-md);
        }
        .video-card .prediction-overlay {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--primary);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: var(--shadow-md);
        }

        /* Control Bar */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 16px 0;
        }
        .control-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            color: var(--text);
            transition: all 0.2s;
        }
        .control-btn:hover { background: var(--surface-hover); }
        .control-btn.active { background: var(--primary); color: #fff; }
        .control-btn.muted { background: #FEE2E2; color: var(--danger); }

        /* Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 16px; }
        .panel {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }
        .panel h3 {
            color: var(--text);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Prediction */
        .prediction-history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 40px;
        }
        .predicted-letter {
            background: var(--primary);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .confidence-bar {
            width: 100%;
            height: 6px;
            background: var(--surface);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }
        .confidence-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* Users List */
        .users-list { display: flex; flex-direction: column; gap: 8px; }
        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--surface);
            border-radius: var(--radius);
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .user-name { flex: 1; font-size: 0.875rem; color: var(--text); }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        /* Chat */
        .chat-messages {
            height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 4px;
        }
        .chat-message {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 0.875rem;
            max-width: 85%;
        }
        .chat-message.own {
            background: var(--primary);
            color: #fff;
            align-self: flex-end;
        }
        .chat-message.other {
            background: var(--surface);
            color: var(--text);
            align-self: flex-start;
        }
        .chat-input-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .chat-input-group input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
        }
        .chat-input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .chat-input-group button {
            padding: 10px 16px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .meeting-container.active { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .video-grid.two,
            .video-grid.four,
            .video-grid.six { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .brand-name { font-size: 1.3rem; }
            .join-card { padding: 24px; }
        }
    </style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <span class="brand-icon"><i class="fas fa-users"></i></span>
                <span class="brand-name">Teman Meeting Kamu</span>
            </div>
            <p class="brand-subtitle">Video call dengan BISINDO gesture recognition</p>
        </header>

        <!-- Join Form -->
        <div class="join-container" id="joinForm">
            <div class="join-card">
                <h2>Gabung Meeting</h2>
                <div class="form-group">
                    <label for="username">Nama Anda</label>
                    <input type="text" id="username" placeholder="Masukkan nama Anda" maxlength="30" required>
                </div>
                <div class="form-group">
                    <label for="roomId">Room ID (opsional)</label>
                    <input type="text" id="roomId" placeholder="Kosongkan untuk buat baru">
                </div>
                <button class="btn btn-primary" onclick="joinMeeting()">Gabung</button>
            </div>
        </div>

        <!-- Meeting Interface -->
        <div class="meeting-container" id="meetingContainer">
            <div class="video-section">
                <div class="room-header">
                    <div class="room-info">
                        <span class="room-label">Room:</span>
                        <span class="room-id" id="currentRoom">-</span>
                        <button class="btn-copy" onclick="copyRoomLink()" title="Copy link"><i class="fas fa-copy"></i></button>
                    </div>
                    <button class="btn-exit" onclick="exitMeeting()">Keluar</button>
                </div>

                <div class="video-grid" id="videoGrid">
                    <div class="video-card" id="localCard">
                        <video id="localVideo" autoplay playsinline muted></video>
                        <div class="username" id="localUsername">Anda</div>
                        <div class="prediction-overlay" id="predictionOverlay" style="display:none;"></div>
                    </div>
                </div>

                <div class="controls">
                    <button class="control-btn active" id="cameraBtn" onclick="toggleCamera()"><i class="fas fa-video"></i></button>
                    <button class="control-btn active" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h3><i class="fas fa-hands"></i> Prediksi</h3>
                    <div class="prediction-history" id="predictionHistory">
                        <span style="color:var(--text-muted)">Akan muncul...</span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill" style="width:0%"></div>
                    </div>
                </div>

                <div class="panel">
                    <h3><i class="fas fa-users"></i> Participants (<span id="userCount">0</span>)</h3>
                    <div class="users-list" id="usersList"></div>
                </div>

                <div class="panel">
                    <h3><i class="fas fa-comment"></i> Chat</h3>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-group">
                        <input type="text" id="chatInput" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')sendMessage()">
                        <button onclick="sendMessage()">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <link rel="icon" href="data:,">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/js/meeting.js"></script>
</body>
</html>
