<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BISINDO Meeting - Video Call with Gesture Recognition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .join-form {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            margin: 30px auto;
            backdrop-filter: blur(10px);
        }

        .join-form input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
        }

        .join-form input:focus {
            outline: 2px solid #00d9ff;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,217,255,0.3);
        }

        .meeting-container {
            display: none;
            gap: 20px;
        }

        .meeting-container.active {
            display: grid;
            grid-template-columns: 1fr 350px;
        }

        .video-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .video-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .video-card video {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: #000;
        }

        .video-card canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .video-card .username {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .prediction-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,255,136,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a1a2e;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
        }

        .panel h3 {
            margin-bottom: 15px;
            color: #00d9ff;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .prediction-history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 50px;
        }

        .predicted-letter {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .users-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a2e;
        }

        .chat-messages {
            height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .chat-message {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .chat-message.own {
            background: rgba(0,217,255,0.2);
            align-self: flex-end;
        }

        .chat-message.other {
            background: rgba(255,255,255,0.1);
        }

        .chat-input-group {
            display: flex;
            gap: 8px;
        }

        .chat-input-group input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .chat-input-group button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #00d9ff;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-indicator.online { background: #00ff88; }
        .status-indicator.offline { background: #ff4757; }

        .confidence-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .control-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .control-btn.active {
            background: #ff4757;
            color: white;
        }

        .control-btn:not(.active) {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .room-link {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .room-link code {
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 4px;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤟 BISINDO Meeting</h1>
            <p>Video call dengan pengenalan gestur bahasa isyarat real-time</p>
        </header>

        <!-- Join Form -->
        <div class="join-form" id="joinForm">
            <input type="text" id="username" placeholder="Nama Anda" value="">
            <input type="text" id="roomId" placeholder="ID Room (kosongkan untuk buat baru)" value="">
            <button class="btn btn-primary" onclick="joinMeeting()">Gabung Meeting</button>
        </div>

        <!-- Meeting Interface -->
        <div class="meeting-container" id="meetingContainer">
            <div class="video-section">
                <div class="video-grid">
                    <div class="video-card" id="localVideoCard">
                        <video id="localVideo" autoplay muted playsinline></video>
                        <canvas id="localCanvas"></canvas>
                        <div class="username" id="localUsername">Anda</div>
                        <div class="prediction-overlay" id="predictionOverlay" style="display:none;"></div>
                    </div>
                    <div class="video-card" id="remoteVideoCard">
                        <video id="remoteVideo" autoplay playsinline></video>
                        <div class="username">Partner</div>
                    </div>
                </div>

                <div class="room-link">
                    Room: <code id="currentRoom">-</code>
                    <button onclick="copyRoomLink()" style="margin-left:10px; padding:5px 10px; border:none; border-radius:4px; background:#00d9ff; color:#1a1a2e; cursor:pointer;">Copy</button>
                </div>

                <div class="controls">
                    <button class="control-btn active" id="cameraBtn" onclick="toggleCamera()">📹 Camera</button>
                    <button class="control-btn active" id="micBtn" onclick="toggleMic()">🎤 Mic</button>
                    <button class="control-btn" id="bisindoBtn" onclick="toggleBisindo()">🤟 BISINDO Mode</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h3>🤟 Prediksi Huruf</h3>
                    <div class="prediction-history" id="predictionHistory">
                        <span style="color: rgba(255,255,255,0.5);">Akan muncul di sini...</span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill" style="width: 0%;"></div>
                    </div>
                    <div id="confidenceText" style="font-size:0.8rem; margin-top:5px; color:rgba(255,255,255,0.7);"></div>
                </div>

                <div class="panel">
                    <h3>👥 Participants</h3>
                    <div class="users-list" id="usersList">
                        <!-- Users will be added here -->
                    </div>
                </div>

                <div class="panel">
                    <h3>💬 Chat</h3>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-group">
                        <input type="text" id="chatInput" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')sendMessage()">
                        <button onclick="sendMessage()">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <link rel="icon" href="data:,">
    <script src="/static/js/meeting.js"></script>
</body>
</html>
